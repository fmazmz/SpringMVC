<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Become a Driver</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/tables.css}"/>
    <style>
        .form-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: white;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            padding: 8px 10px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .form-input:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 32px 0 16px;
        }

        .form-footer {
            text-align: center;
            margin-top: 8px;
            margin-bottom: 32px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        .input-hint {
            display: block;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .data-table td:first-child {
            background: rgba(0, 0, 0, 0.6);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            width: 140px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.4px;
        }

        .data-table td:first-child label {
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            display: block;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-header">
    <h2>Become a Driver</h2>
</div>

<div th:if="${error}" class="message error" th:text="${error}"></div>

<div class="list-container">
    <div class="table-container" style="max-width: 650px;">
        <div class="table-card">
            <form th:action="@{/drivers/new}"
                  th:object="${driver}"
                  method="post"
                  id="createForm"
                  style="width: 100%; margin: 0;">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <table class="data-table" style="margin-bottom: 0;">
                    <tbody>
                    <tr>
                        <td>
                            <label for="fname">First Name</label>
                        </td>
                        <td>
                            <input type="text"
                                   id="fname"
                                   th:field="*{fname}"
                                   placeholder="Oscar"
                                   class="form-input">
                            <span class="field-error" th:if="${#fields.hasErrors('fname')}" th:errors="*{fname}"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="lname">Last Name</label>
                        </td>
                        <td>
                            <input type="text"
                                   id="lname"
                                   th:field="*{lname}"
                                   placeholder="Danielsson"
                                   class="form-input">
                            <span class="field-error" th:if="${#fields.hasErrors('lname')}" th:errors="*{lname}"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="ssn">SSN</label>
                            <span class="input-hint">YYYYMMDDXXXX</span>
                        </td>
                        <td>
                            <input type="text"
                                   id="ssn"
                                   th:field="*{ssn}"
                                   placeholder="199001011234"
                                   class="form-input">
                            <span class="field-error" th:if="${#fields.hasErrors('ssn')}" th:errors="*{ssn}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </form>
        </div>
    </div>

    <div class="button-group">
        <button type="submit" form="createForm" class="btn btn-primary">Become a Driver</button>
        <a th:href="@{/}" class="btn">Cancel</a>
    </div>

    <div class="form-footer">
        All fields are required
    </div>
</div>

</body>
</html>
