<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>Drivers</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/tables.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/list-pages.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:if="${error}" class="message error" th:text="${error}"></div>
<div th:if="${success}" class="message success" th:text="${success}"></div>

<div class="page-header">
    <h2>Drivers</h2>
</div>

<div class="list-container">
    <div class="filter-section">
        <div class="filter-box">
            <form class="filter-form" th:action="@{/drivers}" method="get">

                <div class="filter-group">
                    <label for="q">Search</label>
                    <input type="text" id="q" name="q" th:value="${filter.q}" placeholder="Name, SSN...">
                </div>

                <div class="filter-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" th:value="${filter.fname}" placeholder="Oscar">
                </div>

                <div class="filter-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" th:value="${filter.lname}" placeholder="Danielsson">
                </div>

                <div class="filter-group">
                    <label for="ssn">SSN</label>
                    <input type="text" id="ssn" name="ssn" th:value="${filter.ssn}" placeholder="YYYYMMDDXXXX">
                </div>

                <div class="filter-group">
                    <label for="driverId">Driver ID</label>
                    <input type="text" id="driverId" name="driverId" th:value="${filter.driverId != null ? filter.driverId.toString() : ''}" placeholder="UUID">
                </div>

                <div class="filter-group">
                    <label for="sort">Sort By</label>
                    <select id="sort" name="sort">
                        <option value="fname,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'fname,asc')}">First Name A-Z</option>
                        <option value="fname,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'fname,desc')}">First Name Z-A</option>
                        <option value="lname,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'lname,asc')}">Last Name A-Z</option>
                        <option value="lname,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'lname,desc')}">Last Name Z-A</option>
                        <option value="ssn,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'ssn,asc')}">SSN Asc</option>
                        <option value="ssn,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'ssn,desc')}">SSN Desc</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="size">Page size</label>
                    <select id="size" name="size">
                        <option value="5" th:selected="${param.size != null and #strings.contains(param.size[0], '5')}">5</option>
                        <option value="10" th:selected="${param.size == null or #strings.contains(param.size[0], '10')}">10</option>
                        <option value="20" th:selected="${param.size != null and #strings.contains(param.size[0], '20')}">20</option>
                        <option value="50" th:selected="${param.size != null and #strings.contains(param.size[0], '50')}">50</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit" class="btn">Apply</button>
                    <a th:href="@{/drivers}" class="btn">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="table-container">
        <div class="table-card">
            <table class="data-table" th:if="${drivers != null and !drivers.content.isEmpty()}">
                <thead>
                <tr>
                    <th>Driver ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>SSN</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                    <th sec:authorize="hasRole('ADMIN')">Admin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${drivers.content}">
                    <td th:text="${d.id}">Driver ID</td>
                    <td th:text="${d.fname}">First Name</td>
                    <td th:text="${d.lname}">Last Name</td>
                    <td th:text="${d.ssn}">SSN</td>

                    <td sec:authorize="hasRole('ADMIN')">
                        <div class="button-group">
                            <a th:href="@{/drivers/{id}/update(id=${d.id})}" class="btn btn-sm">Edit</a>
                        </div>
                    </td>

                    <td sec:authorize="hasRole('ADMIN')">
                        <form th:action="@{/drivers/{id}/delete(id=${d.id})}"
                              method="post"
                              onsubmit="return confirm('Are you sure you want to delete this driver?');"
                              class="form-inline">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${drivers == null or drivers.content.isEmpty()}" class="empty-state">
                <p>No drivers found. Try adjusting your filters.</p>
            </div>
        </div>
    </div>

    <div class="pagination" th:if="${drivers != null and drivers.totalPages > 0}">
        <a th:if="${drivers.hasPrevious()}"
           th:href="@{/drivers(
               page=${drivers.number-1},
               size=${param.size},
               q=${filter.q},
               fname=${filter.fname},
               lname=${filter.lname},
               ssn=${filter.ssn},
               driverId=${filter.driverId},
               sort=${param.sort}
           )}" class="btn btn-sm">
            ← Previous
        </a>

        <span>Page <span th:text="${drivers.number + 1}"></span> of <span th:text="${drivers.totalPages}"></span></span>

        <a th:if="${drivers.hasNext()}"
           th:href="@{/drivers(
               page=${drivers.number+1},
               size=${param.size},
               q=${filter.q},
               fname=${filter.fname},
               lname=${filter.lname},
               ssn=${filter.ssn},
               driverId=${filter.driverId},
               sort=${param.sort}
           )}" class="btn btn-sm">
            Next →
        </a>
    </div>
</div>

<script type="text/javascript" th:src="@{/js/filter-forms.js}"></script>

</body>
</html>
