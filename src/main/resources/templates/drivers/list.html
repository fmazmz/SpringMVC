<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <title>Drivers</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/tables.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/forms.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-header">
    <h2>Drivers</h2>
</div>

<div class="form-container-simple">
    <form class="form-simple" th:action="@{/drivers}" method="get" id="filterForm">

        <div class="form-field-simple">
            <label for="q">Search</label>
            <div class="form-field-input">
                <input type="text" id="q" name="q" th:value="${filter.q}" placeholder="Search...">
            </div>
        </div>

        <div class="form-field-simple">
            <label for="searchIn">Search In</label>
            <div class="form-field-input">
                <select id="searchIn" name="searchIn">
                    <option value="all" th:selected="${filter.searchIn == null or filter.searchIn == 'all'}">All Fields</option>
                    <option value="fname" th:selected="${filter.searchIn == 'fname'}">First Name</option>
                    <option value="lname" th:selected="${filter.searchIn == 'lname'}">Last Name</option>
                    <option value="ssn" th:selected="${filter.searchIn == 'ssn'}">SSN</option>
                </select>
            </div>
        </div>

        <div class="form-field-simple">
            <label for="fname">First Name</label>
            <div class="form-field-input">
                <input type="text" id="fname" name="fname" th:value="${filter.fname}">
            </div>
        </div>

        <div class="form-field-simple">
            <label for="lname">Last Name</label>
            <div class="form-field-input">
                <input type="text" id="lname" name="lname" th:value="${filter.lname}">
            </div>
        </div>

        <div class="form-field-simple">
            <label for="ssn">SSN</label>
            <div class="form-field-input">
                <input type="text" id="ssn" name="ssn" th:value="${filter.ssn}">
            </div>
        </div>

        <div class="form-field-simple">
            <label for="driverId">Driver ID</label>
            <div class="form-field-input">
                <input type="text" id="driverId" name="driverId" th:value="${filter.driverId}">
            </div>
        </div>

        <div class="form-field-simple">
            <label for="sort">Sort By</label>
            <div class="form-field-input">
                <select id="sort" name="sort">
                    <option value="fname,asc" th:selected="${param.sort == null or #lists.contains(param.sort, 'fname,asc')}">First Name A-Z</option>
                    <option value="fname,desc" th:selected="${param.sort != null and #lists.contains(param.sort, 'fname,desc')}">First Name Z-A</option>
                    <option value="lname,asc" th:selected="${param.sort != null and #lists.contains(param.sort, 'lname,asc')}">Last Name A-Z</option>
                    <option value="lname,desc" th:selected="${param.sort != null and #lists.contains(param.sort, 'lname,desc')}">Last Name Z-A</option>
                    <option value="ssn,asc" th:selected="${param.sort != null and #lists.contains(param.sort, 'ssn,asc')}">SSN Asc</option>
                    <option value="ssn,desc" th:selected="${param.sort != null and #lists.contains(param.sort, 'ssn,desc')}">SSN Desc</option>
                </select>
            </div>
        </div>

        <div class="form-field-simple">
            <label for="size">Page Size</label>
            <div class="form-field-input">
                <select id="size" name="size">
                    <option value="5" th:selected="${param.size == null or #lists.contains(param.size, '5')}">5</option>
                    <option value="10" th:selected="${param.size != null and #lists.contains(param.size, '10')}">10</option>
                    <option value="20" th:selected="${param.size != null and #lists.contains(param.size, '20')}">20</option>
                    <option value="50" th:selected="${param.size != null and #lists.contains(param.size, '50')}">50</option>
                </select>
            </div>
        </div>

        <div class="button-container-simple">
            <button type="submit">Filter</button>
            <a th:href="@{/drivers}">
                <button type="button">Clear</button>
            </a>
        </div>
    </form>
</div>

<div class="list-container">
    <table class="data-table">
        <thead>
        <tr>
            <th>Driver ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>SSN</th>
            <th sec:authorize="hasRole('ADMIN')">Update</th>
            <th sec:authorize="hasRole('ADMIN')">Delete</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${drivers.content}">
            <td th:text="${d.id}">Driver ID</td>
            <td th:text="${d.fname}">First Name</td>
            <td th:text="${d.lname}">Last Name</td>
            <td th:text="${d.ssn}">SSN</td>

            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/drivers/{id}/update(id=${d.id})}">
                    <button type="button">Update</button>
                </a>
            </td>

            <td sec:authorize="hasRole('ADMIN')">
                <form th:action="@{/drivers/{id}/delete(id=${d.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>

        <tr th:if="${drivers.content.isEmpty()}">
            <td colspan="6">No drivers found.</td>
        </tr>
        </tbody>
    </table>
</div>

<div class="pagination">
    <a th:if="${drivers.hasPrevious()}"
       th:href="@{/drivers(
            page=${drivers.number-1},
            size=${param.size},
            q=${filter.q},
            searchIn=${filter.searchIn},
            fname=${filter.fname},
            lname=${filter.lname},
            ssn=${filter.ssn},
            driverId=${filter.driverId},
            sort=${param.sort})}">
        Previous
    </a>

    <span>
        Page <span th:text="${drivers.number + 1}"></span>
        of <span th:text="${drivers.totalPages}"></span>
    </span>

    <a th:if="${drivers.hasNext()}"
       th:href="@{/drivers(
            page=${drivers.number+1},
            size=${param.size},
            q=${filter.q},
            searchIn=${filter.searchIn},
            fname=${filter.fname},
            lname=${filter.lname},
            ssn=${filter.ssn},
            driverId=${filter.driverId},
            sort=${param.sort})}">
        Next
    </a>
</div>

<div th:if="${success}" class="success-message">
    <span th:text="${success}"></span>
</div>

<script>
    const filterForm = document.getElementById('filterForm');
    const textInputs = filterForm.querySelectorAll('input[type="text"]');
    const selects = filterForm.querySelectorAll('select');

    let timeout;

    textInputs.forEach(input => {
        input.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                filterForm.submit();
            }, 500);
        });
    });

    selects.forEach(select => {
        select.addEventListener('change', () => {
            filterForm.submit();
        });
    });
</script>

</body>
</html>
