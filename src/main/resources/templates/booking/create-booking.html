<form th:action="@{/bookings}" th:object="${booking}" method="post">

    <label>Car</label>
    <select th:field="*{carId}">
        <option th:each="car : ${cars}"
                th:value="${car.id}"
                th:text="${car.make + ' ' + car.model}">
        </option>
    </select>

    <label>Start Time</label>
    <input type="datetime-local" th:field="*{startTime}"/>

    <label>End Time</label>
    <input type="datetime-local" th:field="*{endTime}"/>

    <label>Insurance</label>
    <select th:field="*{insuranceType}">
        <option value="BASIC">Basic</option>
        <option value="PREMIUM">Premium</option>
        <option value="FULL_COVERAGE">Full Coverage</option>
    </select>

    <button type="submit">Book</button>

</form>
