<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Signup</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
</head>
<body>
<div style="display: flex; text-align: center; align-items: center; flex-direction: column; margin-top: 0px">
    <h2>Create Car</h2>
</div>
<div th:if="${error}" class="error-message" th:text="${error}">
</div>
<div style="display: flex; text-align: center; align-items: center; flex-direction: column; margin-top: 0px">

    <form style="display:flex; flex-direction:column; gap:10px;" th:action="@{/signup}" th:object="${user}" method="post">

        <div style="display:flex; gap:10px; align-items:center;">
            <label for="email" style="width:120px;">Email</label>
            <div style="display:flex; flex-direction:column;">
                <input type="text" id="email" th:field="*{email}">
                <span class="field-error" th:errors="*{email}"></span>
            </div>
        </div>

        <div style="display:flex; gap:10px; align-items:center;">
            <label for="password" style="width:120px;">Password</label>
            <div style="display:flex; flex-direction:column;">
                <input type="password" id="password" th:field="*{password}">
                <span class="field-error" th:errors="*{password}"></span>
            </div>
        </div>

        <div style ="display: flex; align-items: center; flex-direction: column; margin-top:10px; width:100%;">
            <button type="submit">Create Account</button>
        </div>
    </form>
</div>
</body>
