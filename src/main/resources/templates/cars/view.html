<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>Car Details</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:if="${error}" class="message error" th:text="${error}"></div>
<div th:if="${success}" class="message success" th:text="${success}"></div>

<div class="page-header">
    <h2>Car Details</h2>
</div>

<div class="list-container">
    <div class="table-container" style="max-width: 600px;">
        <div class="table-card">
            <table class="data-table">
                <tbody>
                <tr>
                    <td style="width: 140px; background: rgba(0, 0, 0, 0.5); font-weight: 500;">Make</td>
                    <td th:text="${car.make}">Make</td>
                </tr>
                <tr>
                    <td style="background: rgba(0, 0, 0, 0.5); font-weight: 500;">Model</td>
                    <td th:text="${car.model}">Model</td>
                </tr>
                <tr>
                    <td style="background: rgba(0, 0, 0, 0.5); font-weight: 500;">Hourly Price</td>
                    <td th:text="${car.hourlyPrice}">Hourly Price</td>
                </tr>
                <tr>
                    <td style="background: rgba(0, 0, 0, 0.5); font-weight: 500;">Licence Plate</td>
                    <td th:text="${car.licencePlate}">Licence Plate</td>
                </tr>
                <tr>
                    <td style="background: rgba(0, 0, 0, 0.5); font-weight: 500;">VIN</td>
                    <td th:text="${car.vin}">VIN</td>
                </tr>
                <tr>
                    <td style="background: rgba(0, 0, 0, 0.5); font-weight: 500;">Year</td>
                    <td th:text="${car.year}">Year</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="button-group" style="justify-content: center; margin: 24px 0;">
        <a th:href="@{/cars/browse}" class="btn btn-primary">Back to Browse</a>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/cars/{id}/update(id=${car.id})}"
           class="btn">Edit Car</a>
        <span sec:authorize="hasRole('ADMIN')">
            <form th:action="@{/cars/{id}/delete(id=${car.id})}"
                  method="post"
                  style="display: inline;"
                  onsubmit="return confirm('Are you sure you want to delete this car?');">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-danger">Delete Car</button>
            </form>
        </span>
    </div>
</div>

</body>
</html>
