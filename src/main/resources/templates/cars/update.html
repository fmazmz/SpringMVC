<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>Update Car</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/form-tables.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:if="${error}" class="message error" th:text="${error}"></div>
<div th:if="${success}" class="message success" th:text="${success}"></div>

<div class="page-header">
    <h2>Update Car</h2>
</div>

<div class="list-container">
    <div class="table-container table-container-max-width-650">
        <div class="table-card">
            <form th:action="@{/cars/{id}/update(id=${carId})}"
                  th:object="${car}"
                  method="post"
                  id="updateForm"
                  class="form-width-100">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <table class="data-table data-table-margin-bottom-0">
                    <tbody>
                    <tr>
                        <td>
                            <label for="make">Make</label>
                        </td>
                        <td>
                            <input type="text"
                                   id="make"
                                   th:field="*{make}"
                                   placeholder="BMW, Mercedes, Toyota..."
                                   class="form-input">
                            <span class="field-error" th:if="${#fields.hasErrors('make')}" th:errors="*{make}"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="model">Model</label>
                        </td>
                        <td>
                            <input type="text"
                                   id="model"
                                   th:field="*{model}"
                                   placeholder="X5, C-Class, Camry..."
                                   class="form-input">
                            <span class="field-error" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="hourlyPrice">Hourly Price</label>
                        </td>
                        <td>
                            <div class="price-input-wrapper">
                                <span class="price-input-symbol">$</span>
                                <input type="number"
                                       step="0.01"
                                       id="hourlyPrice"
                                       th:field="*{hourlyPrice}"
                                       placeholder="25.00"
                                       class="form-input price-input-field">
                            </div>
                            <span class="field-error" th:if="${#fields.hasErrors('hourlyPrice')}" th:errors="*{hourlyPrice}"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="licencePlate">License Plate</label>
                        </td>
                        <td>
                            <input type="text"
                                   id="licencePlate"
                                   th:field="*{licencePlate}"
                                   placeholder="ABC-123"
                                   class="form-input"
                                   class="input-uppercase">
                            <span class="field-error" th:if="${#fields.hasErrors('licencePlate')}" th:errors="*{licencePlate}"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="vin">VIN</label>
                        </td>
                        <td>
                            <input type="text"
                                   id="vin"
                                   th:field="*{vin}"
                                   placeholder="1HGCM82633A123456"
                                   class="form-input"
                                   class="input-uppercase">
                            <span class="field-error" th:if="${#fields.hasErrors('vin')}" th:errors="*{vin}"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="year">Year</label>
                        </td>
                        <td>
                            <input type="number"
                                   id="year"
                                   th:field="*{year}"
                                   placeholder="2024"
                                   class="form-input">
                            <span class="field-error" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </form>
        </div>
    </div>

    <div class="button-group">
        <button type="submit" form="updateForm" class="btn btn-primary">Update Car</button>
        <a th:href="@{/cars/{id}(id=${carId})}" class="btn">Cancel</a>
    </div>
</div>

</body>
</html>
