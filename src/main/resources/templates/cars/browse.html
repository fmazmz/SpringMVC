<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>Browse Cars</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:if="${error}" class="message error" th:text="${error}"></div>
<div th:if="${success}" class="message success" th:text="${success}"></div>

<div class="page-header">
    <h2>Browse Cars</h2>
</div>

<div class="list-container">
    <div class="filter-section">
        <div class="filter-box">
            <form class="filter-form" th:action="@{/cars/browse}" method="get">
                <div class="filter-group">
                    <label for="q">Search</label>
                    <input type="text" id="q" name="q" th:value="${filter.q}" placeholder="Make, model...">
                </div>

                <div class="filter-group">
                    <label for="make">Make</label>
                    <input type="text" id="make" name="make" th:value="${filter.make}" placeholder="BMW">
                </div>

                <div class="filter-group">
                    <label for="model">Model</label>
                    <input type="text" id="model" name="model" th:value="${filter.model}" placeholder="X5">
                </div>

                <div class="filter-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" name="year" th:value="${filter.year}" placeholder="2022">
                </div>

                <div class="filter-group">
                    <label for="minPrice">Min Price</label>
                    <input type="number" step="0.01" id="minPrice" name="minPrice" th:value="${filter.minPrice}" placeholder="10.00">
                </div>

                <div class="filter-group">
                    <label for="maxPrice">Max Price</label>
                    <input type="number" step="0.01" id="maxPrice" name="maxPrice" th:value="${filter.maxPrice}" placeholder="100.00">
                </div>

                <div class="filter-group">
                    <label for="sort">Sort By</label>
                    <select id="sort" name="sort">
                        <option value="make,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'make,asc')}">Make A-Z</option>
                        <option value="make,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'make,desc')}">Make Z-A</option>
                        <option value="model,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'model,asc')}">Model A-Z</option>
                        <option value="model,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'model,desc')}">Model Z-A</option>
                        <option value="hourlyPrice,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'hourlyPrice,asc')}">Price Low-High</option>
                        <option value="hourlyPrice,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'hourlyPrice,desc')}">Price High-Low</option>
                        <option value="year,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'year,desc')}">Newest</option>
                        <option value="year,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'year,asc')}">Oldest</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit" class="btn">Apply</button>
                    <a th:href="@{/cars/browse}" class="btn">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="table-container">
        <div class="table-card">
            <table class="data-table" th:if="${cars != null and !cars.content.isEmpty()}">
                <thead>
                <tr>
                    <th>Make</th>
                    <th>Model</th>
                    <th>Hourly Price</th>
                    <th>Licence Plate</th>
                    <th>VIN</th>
                    <th>Year</th>
                    <th>Actions</th>
                    <th sec:authorize="hasRole('ADMIN')">Admin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${cars.content}">
                    <td th:text="${c.make}">Make</td>
                    <td th:text="${c.model}">Model</td>
                    <td th:text="${c.hourlyPrice + ' kr'}">Price</td>
                    <td th:text="${c.licencePlate}">Plate</td>
                    <td th:text="${c.vin}">VIN</td>
                    <td th:text="${c.year}">Year</td>
                    <td>
                        <div class="button-group">
                            <a th:href="@{/cars/{id}(id=${c.id})}" class="btn btn-sm">View</a>
                            <span sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/cars/{id}/update(id=${c.id})}" class="btn btn-sm">Edit</a>
                            </span>
                        </div>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <form th:action="@{/cars/{id}/delete(id=${c.id})}"
                              method="post"
                              onsubmit="return confirm('Are you sure you want to delete this car?');"
                              class="form-inline">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${cars == null or cars.content.isEmpty()}" class="empty-state">
                <p>No cars found. Try adjusting your filters.</p>
            </div>
        </div>
    </div>

    <div class="pagination" th:if="${cars != null and cars.totalPages > 0}">
        <a th:if="${cars.hasPrevious()}"
           th:href="@{/cars/browse(page=${cars.number-1}, q=${param.q}, make=${param.make}, model=${param.model}, year=${param.year}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, sort=${param.sort})}"
           class="btn btn-sm">
            ← Previous
        </a>
        <span>Page <span th:text="${cars.number + 1}"></span> of <span th:text="${cars.totalPages}"></span></span>
        <a th:if="${cars.hasNext()}"
           th:href="@{/cars/browse(page=${cars.number+1}, q=${param.q}, make=${param.make}, model=${param.model}, year=${param.year}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, sort=${param.sort})}"
           class="btn btn-sm">
            Next →
        </a>
    </div>
</div>
</body>
</html>v
