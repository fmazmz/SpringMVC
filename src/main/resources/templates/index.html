<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <title>Fleetify - Premium Car Rental Service</title>
</head>

<body class="home-page">
<div class="home-background"></div>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Floating Login Form -->
<div class="floating-login" sec:authorize="!isAuthenticated()">
    <h2>Fleetify</h2>
    <div class="subtitle">Premium Car Rental Service</div>

    <div th:if="${param.error}" class="error-message">
        Invalid email or password
    </div>

    <div th:if="${param.logout}" class="success-message">
        You have been logged out
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="username" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer-links">
        <p>Don't have an account? <a th:href="@{/signup/new}">Sign up here</a></p>
    </div>
</div>
</body>
</html>
