<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>Update Booking - Fleetify</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <style>
        .data-table td {
            transition: background-color 0.2s ease;
        }

        .data-table tr:hover td {
            background: rgba(40, 40, 40, 0.95);
        }

        .data-table td:first-child {
            background: rgba(0, 0, 0, 0.6);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            width: 140px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.4px;
        }

        .data-table td:first-child label {
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            display: block;
        }

        .form-input, .form-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: white;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            padding: 8px 10px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .form-input:hover, .form-select:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .form-input[readonly] {
            background: rgba(255, 255, 255, 0.03);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .form-select option {
            background: #1a1a1a;
            color: white;
        }

        .field-error {
            display: block;
            color: #ffb3b3;
            font-size: 10px;
            margin-top: 4px;
            background: rgba(255, 80, 80, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border-left: 2px solid rgba(255, 80, 80, 0.5);
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
        }

        .btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            min-width: 140px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .table-card {
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            font-family: 'IBM Plex Mono', monospace;
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 12px;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .message {
            max-width: 540px;
            margin: 15px auto;
            padding: 10px 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        .message.error {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.2);
            color: #ffb3b3;
        }

        .page-header h2 {
            color: white;
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            margin: 0;
        }

        .input-hint {
            display: block;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .readonly-info {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:if="${error}" class="message error" th:text="${error}"></div>

<div class="page-header">
    <h2>Update Booking</h2>
</div>

<div class="list-container">
    <div class="table-container" style="max-width: 650px;">
        <div class="table-card">
            <form th:action="@{/bookings/{id}/update(id=${bookingId})}"
                  th:object="${booking}"
                  method="post"
                  id="updateForm"
                  style="width: 100%; margin: 0;">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" th:field="*{carId}" />
                <input type="hidden" th:field="*{driverId}" />

                <table class="data-table" style="margin-bottom: 0;">
                    <tbody>
                    <tr>
                        <td>
                            <label>Car</label>
                        </td>
                        <td>
                            <div class="readonly-info" th:text="${carDisplay}">Car</div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label>Driver</label>
                        </td>
                        <td>
                            <div class="readonly-info" th:text="${driverDisplay}">Driver</div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="startTime">Start Time</label>
                            <span class="input-hint">Required</span>
                        </td>
                        <td>
                            <input type="datetime-local"
                                   id="startTime"
                                   th:field="*{startTime}"
                                   th:value="${formattedStartTime}"
                                   required
                                   class="form-input">
                            <span class="field-error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></span>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="endTime">End Time</label>
                            <span class="input-hint">Required</span>
                        </td>
                        <td>
                            <input type="datetime-local"
                                   id="endTime"
                                   th:field="*{endTime}"
                                   th:value="${formattedEndTime}"
                                   required
                                   class="form-input">
                            <span class="field-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></span>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="insuranceType">Insurance</label>
                            <span class="input-hint">Coverage level</span>
                        </td>
                        <td>
                            <select id="insuranceType" th:field="*{insuranceType}" class="form-select" required>
                                <option value="">-- Select Insurance Type --</option>
                                <option th:each="type : ${insuranceTypes}"
                                        th:value="${type.key}"
                                        th:text="${type.value}"
                                        th:selected="${type.key == booking.insuranceType}">
                                </option>
                            </select>
                            <span class="field-error" th:if="${#fields.hasErrors('insuranceType')}" th:errors="*{insuranceType}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </form>
        </div>
    </div>

    <div class="button-group">
        <button type="submit" form="updateForm" class="btn btn-primary">Update Booking</button>
        <a th:href="@{/bookings}" class="btn">Cancel</a>
    </div>
</div>

</body>
</html>
