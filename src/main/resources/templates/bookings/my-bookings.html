<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>My Bookings - Fleetify</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <style>
        .btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 10px;
            min-width: 60px;
        }

        .btn-danger {
            background: rgba(255, 80, 80, 0.15);
            border-color: rgba(255, 80, 80, 0.3);
            color: #ffb3b3;
        }

        .btn-danger:hover {
            background: rgba(255, 80, 80, 0.25);
            border-color: rgba(255, 80, 80, 0.5);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin: 20px 0;
        }

        .table-card {
            width: 100%;
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            font-family: 'IBM Plex Mono', monospace;
        }

        .data-table th {
            padding: 14px 12px;
            background: rgba(0, 0, 0, 0.75);
            color: rgba(255, 255, 255, 0.92);
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
            text-align: left;
            white-space: nowrap;
        }

        .data-table td {
            padding: 12px;
            background: rgba(20, 20, 20, 0.88);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.92);
            font-size: 12px;
            vertical-align: middle;
        }

        .data-table tbody tr:hover td {
            background: rgba(40, 40, 40, 0.95);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table td form {
            margin: 0;
            display: inline-block;
        }

        .pagination {
            margin: 24px 0 32px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .pagination a {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .pagination a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .pagination span {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }

        .message {
            max-width: 540px;
            margin: 15px auto;
            padding: 10px 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        .message.success {
            background: rgba(80, 255, 80, 0.1);
            border: 1px solid rgba(80, 255, 80, 0.2);
            color: #b3ffb3;
        }

        .page-header h2 {
            color: white;
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            margin: 0 0 20px 0;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
        }

        .list-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 16px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:if="${success}" class="message success" th:text="${success}"></div>

<div class="page-header">
    <h2>My Bookings</h2>
</div>

<div class="list-container">
    <div class="table-container">
        <div class="table-card">
            <table class="data-table" th:if="${bookings != null and !bookings.content.isEmpty()}">
                <thead>
                <tr>
                    <th>Car</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                    <th>Insurance</th>
                    <th>Total Price</th>
                    <th>Actions</th>
                    <th>Cancel</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings.content}">
                    <td th:text="${b.carMake + ' ' + b.carModel}">Car</td>
                    <td th:text="${#temporals.format(b.startTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, HH:mm')}">Start</td>
                    <td th:text="${#temporals.format(b.endTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, HH:mm')}">End</td>
                    <td th:text="${b.insuranceType}">Insurance</td>
                    <td th:text="${'$' + #numbers.formatDecimal(b.totalPrice, 1, 2)}">Price</td>
                    <td>
                        <a th:href="@{/bookings/{id}(id=${b.id})}" class="btn btn-sm">View</a>
                    </td>
                    <td>
                        <form th:action="@{/bookings/my-bookings/{id}/delete(id=${b.id})}"
                              method="post"
                              onsubmit="return confirm('Are you sure you want to cancel this booking?');"
                              style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-danger">Cancel</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${bookings == null or bookings.content.isEmpty()}" class="empty-state">
                <p>You don't have any bookings yet.</p>
            </div>
        </div>
    </div>

    <div class="pagination" th:if="${bookings != null and bookings.totalPages > 1}">
        <a th:if="${bookings.hasPrevious()}"
           th:href="@{/bookings/my-bookings(page=${bookings.number-1})}"
           class="btn btn-sm">
            ← Previous
        </a>
        <span>Page <span th:text="${bookings.number + 1}"></span> of <span th:text="${bookings.totalPages}"></span></span>
        <a th:if="${bookings.hasNext()}"
           th:href="@{/bookings/my-bookings(page=${bookings.number+1})}"
           class="btn btn-sm">
            Next →
        </a>
    </div>
</div>

</body>
</html>
