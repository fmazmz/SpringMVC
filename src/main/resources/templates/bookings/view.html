<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booking Details</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="bookings-wrapper">
    <div class="bookings-card">
        <h2 class="bookings-title">Booking Details</h2>

        <div class="detail-container">
            <div class="detail-row">
                <span class="detail-label">Driver ID:</span>
                <span class="detail-value" th:text="${booking.driverId}">Driver</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Car:</span>
                <span class="detail-value" th:text="${booking.carMake + ' ' + booking.carModel}">Car</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Start Time:</span>
                <span class="detail-value"
                      th:text="${#temporals.format(booking.startTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, yyyy HH:mm')}">
                    Start
                </span>
            </div>

            <div class="detail-row">
                <span class="detail-label">End Time:</span>
                <span class="detail-value"
                      th:text="${#temporals.format(booking.endTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, yyyy HH:mm')}">
                    End
                </span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Insurance:</span>
                <span class="detail-value" th:text="${booking.insuranceType}">Insurance</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Total Price:</span>
                <span class="detail-value price"
                      th:text="${'$' + #numbers.formatDecimal(booking.totalPrice, 1, 2)}">
                    Price
                </span>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
               th:href="@{/bookings}"
               class="btn-secondary">
                ← Back to Bookings
            </a>

            <a th:if="${#authorization.expression('hasRole(''DRIVER'')')}"
               th:href="@{/bookings/my-bookings}"
               class="btn-secondary">
                ← Back to My Bookings
            </a>
        </div>

        <div th:if="${success}" class="message success">
            <span th:text="${success}"></span>
        </div>
    </div>
</div>
</body>
</html>
