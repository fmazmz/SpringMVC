<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetify - Book a Car</title>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/forms.css}"/>
</head>
<body>
<div th:if="${error}" class="error-message" th:text="${error}">
</div>
<div class="form-container">
    <h2>Book a Car</h2>

    <form th:action="@{/bookings/new}" th:object="${booking}" method="get">
        <div class="form-field">
            <label for="startTime">Start Time</label>
            <div class="form-field-input">
                <input type="datetime-local"
                       id="startTime"
                       name="startTime"
                       th:value="${booking.startTime != null ? #temporals.format(booking.startTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'yyyy-MM-dd''T''HH:mm') : ''}">
                <span class="field-error" th:errors="*{startTime}"></span>
            </div>
        </div>

        <div class="form-field">
            <label for="endTime">End Time</label>
            <div class="form-field-input">
                <input type="datetime-local"
                       id="endTime"
                       name="endTime"
                       th:value="${booking.endTime != null ? #temporals.format(booking.endTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'yyyy-MM-dd''T''HH:mm') : ''}">
                <span class="field-error" th:errors="*{endTime}"></span>
            </div>
        </div>

        <div class="button-container">
            <button type="submit">Find Available Cars</button>
        </div>
    </form>

    <form th:if="${cars != null}" th:action="@{/bookings/new}" th:object="${booking}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:field="*{driverId}">
        <input type="hidden"
               name="startTime"
               th:value="${booking.startTime != null ? #temporals.format(booking.startTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'yyyy-MM-dd''T''HH:mm') : ''}">
        <input type="hidden"
               name="endTime"
               th:value="${booking.endTime != null ? #temporals.format(booking.endTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'yyyy-MM-dd''T''HH:mm') : ''}">

        <div class="form-field">
            <label for="car">Car</label>
            <div class="form-field-input">
                <select id="car" th:field="*{carId}">
                    <option value="">Select car</option>
                    <option th:each="car : ${cars}"
                            th:value="${car.id}"
                            th:text="${car.make + ' - ' + car.model}">
                    </option>
                </select>
                <span class="field-error" th:errors="*{carId}"></span>
            </div>
        </div>

        <div class="form-field">
            <label for="insurance">Insurance</label>
            <div class="form-field-input">
                <select id="insurance" th:field="*{insuranceType}">
                    <option value="">Select insurance</option>
                    <option th:each="type : ${insuranceTypes}"
                            th:value="${type.key}"
                            th:text="${type.value}">
                    </option>
                </select>
                <span class="field-error" th:errors="*{insuranceType}"></span>
            </div>
        </div>

        <div class="button-container">
            <button type="submit">Book</button>
        </div>
    </form>

    <div th:if="${cars != null and #lists.isEmpty(cars)}" class="empty-state">
        No cars available for the selected time range.
    </div>
</div>
</body>
</html>
