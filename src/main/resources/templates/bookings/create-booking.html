<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetify - Book a Car</title>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <style>
        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            width: 300px;
        }

        label {
            margin-top: 15px;
            font-weight: bold;
        }

        select, input {
            padding: 5px;
            margin-top: 5px;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Book a Car</h2>

    <form th:action="@{/bookings}" th:object="${booking}" method="post">

        <label for="car">Select Car:</label>
        <select id="car" th:field="*{carId}">
            <option th:each="car : ${cars}"
                    th:value="${car.id}"
                    th:text="${car.make + ' ' + car.model}">
            </option>
        </select>

        <label for="startTime">Start Time:</label>
        <input type="datetime-local" id="startTime" th:field="*{startTime}"/>

        <label for="endTime">End Time:</label>
        <input type="datetime-local" id="endTime" th:field="*{endTime}"/>

        <label for="insurance">Insurance:</label>
        <select id="insurance" th:field="*{insuranceType}">
            <option th:each="type : ${insuranceTypes}" th:value="${type}" th:text="${type}"></option>
        </select>

        <button type="submit">Book</button>
    </form>
</div>
</body>
</html>
