<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>All Bookings - Fleetify</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <style>
        .filter-section {
            max-width: 900px;
            margin: 0 auto 20px;
            width: 100%;
        }

        .filter-box {
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }

        .filter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1 1 160px;
            min-width: 140px;
        }

        .filter-group label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            font-size: 11px;
            font-family: 'IBM Plex Mono', monospace;
            color: white;
            transition: all 0.2s ease;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.12);
        }

        .filter-group select option {
            background: #1a1a1a;
            color: white;
        }

        .filter-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 10px;
            min-width: 60px;
        }

        .btn-danger {
            background: rgba(255, 80, 80, 0.15);
            border-color: rgba(255, 80, 80, 0.3);
            color: #ffb3b3;
        }

        .btn-danger:hover {
            background: rgba(255, 80, 80, 0.25);
            border-color: rgba(255, 80, 80, 0.5);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin: 20px 0;
        }

        .table-card {
            width: 100%;
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            font-family: 'IBM Plex Mono', monospace;
        }

        .data-table th {
            padding: 14px 12px;
            background: rgba(0, 0, 0, 0.75);
            color: rgba(255, 255, 255, 0.92);
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
            text-align: left;
            white-space: nowrap;
        }

        .data-table td {
            padding: 12px;
            background: rgba(20, 20, 20, 0.88);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.92);
            font-size: 12px;
            vertical-align: middle;
        }

        .data-table tbody tr:hover td {
            background: rgba(40, 40, 40, 0.95);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table td form {
            margin: 0;
            display: inline-block;
        }

        .pagination {
            margin: 24px 0 32px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .pagination a {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .pagination a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .pagination span {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }

        .message {
            max-width: 540px;
            margin: 15px auto;
            padding: 10px 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        .message.success {
            background: rgba(80, 255, 80, 0.1);
            border: 1px solid rgba(80, 255, 80, 0.2);
            color: #b3ffb3;
        }

        .message.error {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.2);
            color: #ffb3b3;
        }

        .page-header h2 {
            color: white;
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            margin: 0 0 20px 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:if="${success}" class="message success" th:text="${success}"></div>
<div th:if="${error}" class="message error" th:text="${error}"></div>

<div class="page-header">
    <h2>All Bookings</h2>
</div>

<div class="list-container">
    <div class="filter-section">
        <div class="filter-box">
            <form class="filter-form" th:action="@{/bookings}" method="get" id="filterForm">
                <div class="filter-group">
                    <label for="q">Search</label>
                    <input type="text" id="q" name="q" th:value="${filter.q}" placeholder="Make, model...">
                </div>

                <div class="filter-group">
                    <label for="driverId">Driver ID</label>
                    <input type="text" id="driverId" name="driverId" th:value="${filter.driverId}" placeholder="UUID">
                </div>

                <div class="filter-group">
                    <label for="carId">Car ID</label>
                    <input type="text" id="carId" name="carId" th:value="${filter.carId}" placeholder="UUID">
                </div>

                <div class="filter-group">
                    <label for="insuranceType">Insurance</label>
                    <select id="insuranceType" name="insuranceType">
                        <option value="">All</option>
                        <option th:each="type : ${insuranceTypes}"
                                th:value="${type.name()}"
                                th:text="${type.name()}"
                                th:selected="${filter.insuranceType == type.name()}">
                        </option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sort">Sort By</label>
                    <select id="sort" name="sort">
                        <option value="startTime,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'startTime,desc')}">Start Time: Newest First</option>
                        <option value="startTime,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'startTime,asc')}">Start Time: Oldest First</option>
                        <option value="endTime,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'endTime,desc')}">End Time: Newest First</option>
                        <option value="endTime,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'endTime,asc')}">End Time: Oldest First</option>
                        <option value="totalPrice,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'totalPrice,asc')}">Price Low-High</option>
                        <option value="totalPrice,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'totalPrice,desc')}">Price High-Low</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="size">Page Size</label>
                    <select id="size" name="size">
                        <option value="5" th:selected="${param.size == null or #lists.contains(param.size, '5')}">5</option>
                        <option value="10" th:selected="${param.size != null and #lists.contains(param.size, '10')}">10</option>
                        <option value="20" th:selected="${param.size != null and #lists.contains(param.size, '20')}">20</option>
                        <option value="50" th:selected="${param.size != null and #lists.contains(param.size, '50')}">50</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit" class="btn">Apply</button>
                    <a th:href="@{/bookings}" class="btn">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="table-container">
        <div class="table-card">
            <table class="data-table" th:if="${bookings != null and !bookings.content.isEmpty()}">
                <thead>
                <tr>
                    <th>Driver</th>
                    <th>Car</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                    <th>Insurance</th>
                    <th>Total Price</th>
                    <th>Actions</th>
                    <th sec:authorize="hasRole('ADMIN')">Admin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings.content}">
                    <td th:text="${b.driverId}">Driver</td>
                    <td th:text="${b.carMake + ' ' + b.carModel}">Car</td>
                    <td th:text="${#temporals.format(b.startTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, HH:mm')}">Start</td>
                    <td th:text="${#temporals.format(b.endTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, HH:mm')}">End</td>
                    <td th:text="${b.insuranceType}">Insurance</td>
                    <td th:text="${'$' + #numbers.formatDecimal(b.totalPrice, 1, 2)}">Price</td>
                    <td>
                        <div class="button-group" style="display: flex; gap: 6px;">
                            <a th:href="@{/bookings/{id}(id=${b.id})}" class="btn btn-sm">View</a>
                            <span sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/bookings/{id}/update(id=${b.id})}" class="btn btn-sm">Edit</a>
        </span>
                        </div>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <form th:action="@{/bookings/{id}/delete(id=${b.id})}"
                              method="post"
                              onsubmit="return confirm('Are you sure you want to delete this booking?');"
                              style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${bookings == null or bookings.content.isEmpty()}" class="empty-state">
                <p>No bookings found. Try adjusting your filters.</p>
            </div>
        </div>
    </div>

    <div class="pagination" th:if="${bookings != null and bookings.totalPages > 1}">
        <a th:if="${bookings.hasPrevious()}"
           th:href="@{/bookings(page=${bookings.number-1}, size=${param.size}, q=${filter.q}, carId=${filter.carId}, driverId=${filter.driverId}, insuranceType=${filter.insuranceType}, sort=${param.sort})}"
           class="btn btn-sm">
            ← Previous
        </a>
        <span>Page <span th:text="${bookings.number + 1}"></span> of <span th:text="${bookings.totalPages}"></span></span>
        <a th:if="${bookings.hasNext()}"
           th:href="@{/bookings(page=${bookings.number+1}, size=${param.size}, q=${filter.q}, carId=${filter.carId}, driverId=${filter.driverId}, insuranceType=${filter.insuranceType}, sort=${param.sort})}"
           class="btn btn-sm">
            Next →
        </a>
    </div>
</div>

<script>
    const filterForm = document.getElementById('filterForm');
    const textInputs = filterForm.querySelectorAll('input[type="text"]');
    const selects = filterForm.querySelectorAll('select:not([name="sort"]):not([name="size"])');

    let timeout;
    textInputs.forEach(input => {
        input.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => filterForm.submit(), 500);
        });
    });

    selects.forEach(select => {
        select.addEventListener('change', () => filterForm.submit());
    });
</script>

</body>
</html>
