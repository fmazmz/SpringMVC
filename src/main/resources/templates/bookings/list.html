<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bookings</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/tables.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-header">
    <h2>Bookings</h2>
</div>

<div class="list-container">

    <table class="data-table">
        <thead>
        <tr>
            <th>Driver</th>
            <th>Car</th>
            <th>Start Time</th>
            <th>End Time</th>
            <th>Insurance</th>
            <th>Total Price</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>

        <tr th:each="b : ${bookings.content}">
            <td th:text="${b.driverId}">Driver</td>
            <td th:text="${b.carMake + ' - ' + b.carModel + ' - ' + b.carId}">Car</td>
            <td th:text="${b.startTime}">Start Time</td>
            <td th:text="${b.endTime}">End Time</td>
            <td th:text="${b.insuranceType}">Insurance Type</td>
            <td th:text="${b.totalPrice}">Total Price</td>
            <td>
                <a th:href="@{/bookings/{id}(id=${b.id})}" style="text-decoration: none;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="button">View</button>
                </a>
            </td>
        </tr>

        </tbody>
    </table>
</div>
<div class="pagination">

    <a th:if="${bookings.hasPrevious()}"
       th:href="@{/bookings(page=${bookings.number-1}, carId=${param.carId}, driverId=${param.driverId}, insuranceType=${param.insuranceType}, sort=${param.sort})}">
        Previous
    </a>

    <span>
        Page <span th:text="${bookings.number + 1}"></span>
        of <span th:text="${bookings.totalPages}"></span>
    </span>

    <a th:if="${bookings.hasNext()}"
       th:href="@{/bookings(page=${bookings.number+1}, carId=${param.carId}, driverId=${param.driverId}, insuranceType=${param.insuranceType}, sort=${param.sort})}">
        Next
    </a>

</div>

<div th:if="${success}" class="success-message">
    <span th:text="${success}"></span>
</div>

</body>
</html>
