<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>All Bookings - Fleetify</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/list-pages.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:if="${success}" class="message success" th:text="${success}"></div>
<div th:if="${error}" class="message error" th:text="${error}"></div>

<div class="page-header">
    <h2>All Bookings</h2>
</div>

<div class="list-container">
    <div class="filter-section">
        <div class="filter-box">
            <form class="filter-form" th:action="@{/bookings}" method="get" id="filterForm">
                <div class="filter-group">
                    <label for="q">Search</label>
                    <input type="text" id="q" name="q" th:value="${filter.q}" placeholder="Make, model...">
                </div>

                <div class="filter-group">
                    <label for="driverId">Driver ID</label>
                    <input type="text" id="driverId" name="driverId" th:value="${filter.driverId != null ? filter.driverId.toString() : ''}" placeholder="UUID">
                </div>

                <div class="filter-group">
                    <label for="carId">Car ID</label>
                    <input type="text" id="carId" name="carId" th:value="${filter.carId != null ? filter.carId.toString() : ''}" placeholder="UUID">
                </div>

                <div class="filter-group">
                    <label for="insuranceType">Insurance</label>
                    <select id="insuranceType" name="insuranceType">
                        <option value="">All</option>
                        <option th:each="type : ${insuranceTypes}"
                                th:value="${type.name()}"
                                th:text="${type.name()}"
                                th:selected="${filter.insuranceType == type}">
                        </option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sort">Sort By</label>
                    <select id="sort" name="sort">
                        <option value="startTime,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'startTime,desc')}">Start Time: Newest First</option>
                        <option value="startTime,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'startTime,asc')}">Start Time: Oldest First</option>
                        <option value="endTime,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'endTime,desc')}">End Time: Newest First</option>
                        <option value="endTime,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'endTime,asc')}">End Time: Oldest First</option>
                        <option value="totalPrice,asc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'totalPrice,asc')}">Price Low-High</option>
                        <option value="totalPrice,desc" th:selected="${param.sort != null and #strings.contains(param.sort[0], 'totalPrice,desc')}">Price High-Low</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="size">Page Size</label>
                    <select id="size" name="size">
                        <option value="5" th:selected="${param.size == null or #lists.contains(param.size, '5')}">5</option>
                        <option value="10" th:selected="${param.size != null and #lists.contains(param.size, '10')}">10</option>
                        <option value="20" th:selected="${param.size != null and #lists.contains(param.size, '20')}">20</option>
                        <option value="50" th:selected="${param.size != null and #lists.contains(param.size, '50')}">50</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit" class="btn">Apply</button>
                    <a th:href="@{/bookings}" class="btn">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="table-container">
        <div class="table-card">
            <table class="data-table" th:if="${bookings != null and !bookings.content.isEmpty()}">
                <thead>
                <tr>
                    <th>Driver</th>
                    <th>Car</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                    <th>Insurance</th>
                    <th>Total Price</th>
                    <th>Actions</th>
                    <th sec:authorize="hasRole('ADMIN')">Admin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings.content}">
                    <td th:text="${b.driverId}">Driver</td>
                    <td th:text="${b.carMake + ' ' + b.carModel}">Car</td>
                    <td th:text="${#temporals.format(b.startTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, HH:mm')}">Start</td>
                    <td th:text="${#temporals.format(b.endTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, HH:mm')}">End</td>
                    <td th:text="${b.insuranceType}">Insurance</td>
                    <td th:text="${#numbers.formatDecimal(b.totalPrice, 1, 2) + ' kr'}">Price</td>
                    <td>
                        <div class="button-group button-group-flex">
                            <a th:href="@{/bookings/{id}(id=${b.id})}" class="btn btn-sm">View</a>
                            <span sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/bookings/{id}/update(id=${b.id})}" class="btn btn-sm">Edit</a>
        </span>
                        </div>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <form th:action="@{/bookings/{id}/delete(id=${b.id})}"
                              method="post"
                              onsubmit="return confirm('Are you sure you want to delete this booking?');"
                              class="form-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${bookings == null or bookings.content.isEmpty()}" class="empty-state">
                <p>No bookings found. Try adjusting your filters.</p>
            </div>
        </div>
    </div>

    <div class="pagination" th:if="${bookings != null and bookings.totalPages > 1}">
        <a th:if="${bookings.hasPrevious()}"
           th:href="@{/bookings(page=${bookings.number-1}, size=${param.size}, q=${filter.q}, carId=${filter.carId}, driverId=${filter.driverId}, insuranceType=${filter.insuranceType}, sort=${param.sort})}"
           class="btn btn-sm">
            ← Previous
        </a>
        <span>Page <span th:text="${bookings.number + 1}"></span> of <span th:text="${bookings.totalPages}"></span></span>
        <a th:if="${bookings.hasNext()}"
           th:href="@{/bookings(page=${bookings.number+1}, size=${param.size}, q=${filter.q}, carId=${filter.carId}, driverId=${filter.driverId}, insuranceType=${filter.insuranceType}, sort=${param.sort})}"
           class="btn btn-sm">
            Next →
        </a>
    </div>
</div>

<script type="text/javascript" th:src="@{/js/filter-forms.js}"></script>

</body>
</html>
