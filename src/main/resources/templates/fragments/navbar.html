<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
<body>

<div th:fragment="navbar" class="navbar">

    <div class="navbar-left">
        <h1>
            <a th:href="@{/}">Fleetify</a>
        </h1>
    </div>

    <div class="navbar-right">
        <div class="dropdown" sec:authorize="hasAnyRole('ADMIN','APP_USER','DRIVER')">
            <button class="dropbtn">CARS ▼</button>
            <div class="dropdown-content">
                <a th:href="@{/cars}">Browse Cars</a>
                <a th:href="@{/cars/new}" sec:authorize="hasRole('ADMIN')">Add New Car</a>
            </div>
        </div>

        <div class="dropdown" sec:authorize="hasAnyRole('ADMIN','DRIVER')">
            <button class="dropbtn">BOOKINGS ▼</button>
            <div class="dropdown-content">
                <a th:href="@{/bookings/new}">Book a Car</a>
                <a th:href="@{/bookings/my-bookings}">My bookings</a>
                <a th:href="@{/bookings}" sec:authorize="hasRole('ADMIN')">Bookings</a>
            </div>
        </div>

        <div class="dropdown" sec:authorize="hasRole('ADMIN')">
            <button class="dropbtn">DRIVERS ▼</button>
            <div class="dropdown-content">
                <a th:href="@{/drivers}">Drivers</a>
            </div>
        </div>

        <a th:href="@{/drivers/new}" sec:authorize="hasAnyRole('APP_USER','ADMIN')">Become a Driver</a>

        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit">Logout</button>
        </form>

    </div>

</div>

</body>
</html>
